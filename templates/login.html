{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Header -->
    <div class="auth-header">
      <div class="auth-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h2>Welcome back</h2>
      <p>Sign in to your patient account</p>
    </div>

    <!-- Form -->
    <form method="POST" action="{{ url_for('login') }}">

      <div class="form-group">
        <label for="email">Email Address</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required autocomplete="email">
      </div>

      <div class="form-group" style="margin-top:0.85rem">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter your password" required autocomplete="current-password">
      </div>

      <div style="margin-top:1.5rem">
        <button type="submit">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          Sign In
        </button>
      </div>
    </form>

    <div class="form-divider">or</div>

    <div class="auth-footer">
      New patient?&nbsp;<a class="link" href="{{ url_for('register') }}">Create an account &rarr;</a>
    </div>

  </div>

  <!-- Doctor portal hint -->
  <div style="text-align:center; margin-top:1.25rem">
    <span class="muted" style="font-size:0.82rem">Are you a doctor?&nbsp;</span>
    <a class="link" href="{{ url_for('doctor') }}" style="font-size:0.82rem">Use the Doctor Portal &rarr;</a>
  </div>

</div>
{% endblock %}
